    <script type="text/babel">
      
      const root = ReactDOM.createRoot(document.getElementById('root'));
     
      const { QueryClient, QueryClientProvider, useQuery, useMutation, useQueryClient } = window.ReactQuery;

      window.queryClient = new QueryClient({
        defaultOptions: {
          queries: {
            onError: (err) => showToast("Ops! " + err.message, "error"),
          },
          mutations: {
            onSuccess: () => showToast("Operação realizada com sucesso!", "success"),
            onError: (err) => showToast("Ops! " + err.message, "error"),
          },
        }
      });

      const App = () => (
        <QueryClientProvider client={queryClient}>
          <NavBar />
        </QueryClientProvider>
      );

      root.render(<App />);

      function showToast(message, type = "info", duration = 6000) {
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.classList.add("show"), 10);
        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 500);
        }, duration);
      }
    </script>
