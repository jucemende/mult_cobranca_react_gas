    <script>
      function googleFatch(url){
        
        if(!url) throw new Error('Nenhuma url foi informada')
        
        const request = {url: url}

        const execute = (method, body = null) => {
          request.method = method
          if (body) request.payload = JSON.stringify(body);

          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(reject)
              .fetchApp(request);
          })
        }

        return {          
          GET: () => execute('GET'),
        }

        /*
        const POST = (body) => {}

      }
