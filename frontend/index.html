    <script type="text/babel">
      
      const root = ReactDOM.createRoot(document.getElementById('root'));
      const { QueryClient, QueryClientProvider } = window.ReactQuery;
      const { useQuery, useMutation, useQueryClient } = window.ReactQuery;
      const queryClient = new QueryClient({
        defaultOptions: {
          queries: {
            // Se uma busca falhar, avisa o usuário
            onError: (err) => showToast("Erro ao carregar dados: " + err.message, "error"),
          },
          mutations: {
            // Sempre que um 'save' ou 'delete' der certo
            onSuccess: () => showToast("Operação realizada com sucesso!", "success"),
            // Sempre que um 'save' falhar
            onError: (err) => showToast("Falha na operação: " + err.message, "error"),
          }
        }
      });

      const App = () => (
        <QueryClientProvider client={queryClient}>
          <NavBar />
        </QueryClientProvider>
      );

      root.render(<App />);

      function showToast(message, type = "info", duration = 6000) {
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.classList.add("show"), 10);
        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 500);
        }, duration);
      }
    </script>

    <?!= include("frontend/src/hooks/useClientes"); ?>
