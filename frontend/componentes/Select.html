<script type="text/babel">
  const Select = ({options = [], name = 'selection', label = 'Select', value = null, onChange}) => {

    return (
      <div className="select-wrapper">
        <label>{label}</label>
        <select name={name} value={value} onChange={onChange}>
          <option value="">Selecione</option>

          {options.map((opt) => (
            <option key={opt.value} value={opt.key}>
              {opt.value}
            </option>
          ))}

        </select>
      </div>
    )
  }
</script>
