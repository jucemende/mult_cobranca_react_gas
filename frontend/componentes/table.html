<script type="text/babel">

  const { useEffect } = React

  const Table = ({ tableConfig = {}, data = [], actionHandlers = {} }) => {
    
    const { headers = [], actions = [], domain } = tableConfig

    useEffect(() => {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }, [data, tableConfig]);

    return (
      <div className="container-tabela">
        <table className="tabela-padrao">
          <thead>
            <tr>
              {headers.map(col => (
                <th key={col.key}>{col.label}</th>
              ))}
              {actions.length > 0 && <th></th>}
            </tr>
          </thead>

          <tbody>
            {data.length === 0 && (
              <tr>
                <td colSpan={headers.length+1} style={{ textAlign: "center" }}>
                  Nenhum registro encontrado
                </td>
              </tr>
            )}

            {data.map((row, index) => (
              <tr key={index}>
                {headers.map(col => {
                  const rawValue = row[col.key];

                  if (col.style) {
                    const tag = col.style.find(t => t.value === rawValue);

                    return (
                      <td key={col.key}>
                        <span className={tag ? `tag ${tag.className}` : ""}>
                          {rawValue}
                        </span>
                      </td>
                    );
                  }

                  return (
                    <td key={col.key}>
                      {rawValue}
                    </td>
                  );
                })}
                {actions.length > 0 && (
                  <td>
                    <div className="container-acoes">
                      {actions.map(action =>(
                        <button
                          title={action.title}
                          className="table-action-btn"
                          key={action.type}
                          onClick={() => actionHandlers[action.type]?.(row)}
                        >
                          <i data-lucide={action.icon}></i>
                        </button>
                      ))}
                    </div>
                  </td>
                )}

              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  };
</script>
