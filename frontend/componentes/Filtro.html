<script type="text/babel">

  const Filtro = ({config = []}) => {

    function renderField(field) {
      switch (field.element) {

        case 'input':
          return (
            <div>
              <label>{field.label}</label>
              <input 
                type={field.type}
                name={field.name}
              >
              </input>
            </div>
          )
        
        case 'select':
          return (
            <div className="select-wrapper">
              <label>{field.label}</label>
              <select name={field.name}>
                <option value="">Selecione</option>
                {field.options.map(opt => (
                  <option value={opt.value}>{opt.value}</option>
                ))}
              </select>
            </div>
          )

        default:
          return null
      }
    }

    React.useEffect(() => {
      if (window.lucide) window.lucide.createIcons();
      console.log(config)
    }, []);

    return (
      <div className="tela-filtros">
        <form className="form-filtros">

          <div className="conteiner-title-filters">
            <h1>Filtrar por</h1>
            <button type="button">
                <i data-lucide="x"></i>
            </button>
          </div>

          <div className="conteiner-fields">
            {config.map(renderField)}
          </div>

          <div className="conteiner-btnFiltros">
            <button type="reset" class="btn-secundario">Limpar</button>
            <button type="button" class="btn-primario">Filtrar</button>
          </div>
        </form>
      </div>
    )
  }
</script>
