<script type="text/babel">

  const { useEffect } = React;

  const Table = ({ presentation = {}, data = [], actionHandlers = {}, isLoading = false, activeModal }) => {
    const { tableHeaders = [], actions = [] } = presentation;

    useEffect(() => {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }, [data, presentation, isLoading, activeModal]);

    if (isLoading) {
      return <Loading />;
    }

    return (
      <div className="container-tabela">
        <table className="tabela-padrao">
          <thead>
            <tr>
              {tableHeaders.map(col => (
                <th key={col.key}>{col.label}</th>
              ))}
              {actions.length > 0 && <th>Ações</th>}
            </tr>
          </thead>

          <tbody>
            {data.length === 0 ? (
              <tr>
                <td colSpan={tableHeaders.length + (actions.length > 0 ? 1 : 0)} style={{ textAlign: "center" }}>
                  Nenhum registro encontrado
                </td>
              </tr>
            ) : (
              data.map((row) => (
                // Uso de row.id para melhor performance do React
                <tr key={row.id || row.key || Math.random()}>
                  {tableHeaders.map(col => {
                    const rawValue = row[col.key];

                    // Renderização de Tags/Estilos
                    if (col.style) {
                      const tag = col.style.find(t => t.value === rawValue);
                      return (
                        <td key={col.key}>
                          <span className={tag ? `tag ${tag.className}` : "tag"}>
                            {rawValue}
                          </span>
                        </td>
                      );
                    }

                    if(col.icon) {
                      
                      const icon = rawValue
                        ? 'circle-check-big'
                        : 'circle-x'

                      return (
                        <td key={col.key}>
                          <i data-lucide={icon}></i>
                        </td>
                      )
                    }

                    if(col.date){
                      return <td key={col.key}>{new Date(rawValue).toLocaleDateString()}</td>
                    }

                    return <td key={col.key}>{rawValue}</td>;
                  })}

                  {/* Ações */}
                  {actions.length > 0 && (
                    <td>
                      <div className="container-acoes">
                        {actions.map(action => (
                          <button
                            key={action.type}
                            title={action.title}
                            className={`table-action-btn ${action.className || ''}`}
                            onClick={() => actionHandlers({modal: action.type, record: row})} 
                          >
                            <i data-lucide={action.icon}></i>
                          </button>
                        ))}
                      </div>
                    </td>
                  )}
                </tr>
              ))
            )}
          </tbody>
        </table>
      </div>
    );
  };
</script>
