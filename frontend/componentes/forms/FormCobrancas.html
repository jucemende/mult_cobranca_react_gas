<script type="text/babel">

  const FormCobrancas = ({onClose, codCliente}) => {

    const { data, isLoading, error } = useCobrancasView(codCliente)
    const presentation = data?.response?.presentation || {}

    const [formData, setFormData] = React.useState({
      codCliente: '',
      cliente: '',
      email: '',
      telefone: '',
      canal: '',
      acao: '',
      status: '',
    })

    const handleInputChange = (e) => {
      const { name, value } = e.target;
      setFormData((prev) => ({
        ...prev,
        [name]: value,
      }));
    };

    React.useEffect(() => {
      if (data?.response) {
        const { cliente, regua } = data?.response?.data
        
        setFormData({
          codCliente: cliente.codCliente || '',
          cliente: cliente.cliente || '',
          email: cliente.email || '',
          telefone: cliente.telefone || '',

          fase: regua.faseRegua || '',

          //canal: cobranca.canal || '',
          //acao: cobranca.acao || '',
          //status: cobranca.status || '',
        })
        
      }
    }, [data])
    
    return (
      <div className="drawer-cobranca" id="drawer-cobranca">
        <form className="form-cobranca">

          <h3>Gerar Cobrança</h3>

          <div className="conteiner-cobranca">

            <div>
              <label>Cód. Cliente</label>
              <input
                className="codCliente"
                type="number"
                name="codCliente"
                readonly=""
                value={formData.codCliente}
                onChange={handleInputChange}
              />
            </div>

            <div>
              <label>Nome do Cliente</label>
              <input
                type="text"
                name="cliente"
                readonly=""
                value={formData.cliente}
                onChange={handleInputChange}
              />
            </div>
            <div>
              <label>Perfil</label>
              <input
                type="text"
                name="fase"
                readonly=""
                value={formData.fase}
                onChange={handleInputChange}
              />
            </div>

          </div>

          <div className="conteiner-comunicacao">
            <Select
              options={presentation?.canais}
              name={'canais'}
              label={'Canal'}
              value={''}
              onChange={() => alert('Teste')}
            />

            <Select
              options={presentation?.acoes}
              name={'acoes'}
              label={'Ação'}
              value={''}
              onChange={() => alert('Teste')}
            />

            <Select
              options={presentation?.status}
              name={'status'}
              label={'Status'}
              value={''}
              onChange={() => alert('Teste')}
            />
          </div>

          <div id="container-whatsapp" className="hidden">
            <label>WhatsApp</label>
            <div className="conteiner-contatos">
              <input
                type="text"
                name="telefone"
                value={formData.telefone}
                onChange={handleInputChange}
                placeholder="Digite o número"
              />
              <a id="btnWhats" title="Abrir WhatsApp" className="icon-send" target="_blank" rel="noopener noreferrer" href="">
                <i data-lucide="message-circle"></i>
              </a>
            </div>
          </div>

          <div id="container-email" className="hidden">
            <label>E-mails</label>
            <div className="conteiner-contatos">
              <input
                type="text"
                name="email"
                value={formData.email}
                onChange={handleInputChange}
                placeholder="Digite o e-mail"
              />
              <button className="icon-send" data-action="sendEmail" id="btnSendEmail" title="Enviar E-mail">
                <i data-lucide="send"></i>
              </button>
            </div>
          </div>

          <div className="container-preview-faturas">
            <h3>Faturas vinculadas</h3>
            <Table
              presentation={presentation}
              data={data?.response?.data?.faturas}
              isLoading={isLoading}
            />
          </div>

          <div style={{ marginTop: 'auto', display: 'flex', gap: '8px' }}>
            <button type="button" className="btn-primario" data-action="save" id="btn-salvarCobranca">
              Salvar
            </button>

            <button type="button" className="btn-secundario" onClick={onClose}>
                Cancelar
            </button>
          </div>
        </form>
      </div>
    )
  }
</script>
