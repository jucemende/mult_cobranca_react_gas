<script type="text/babel">

  const FormFiltro = ({presentation = {}, currentValues = {}, onClose,onApply, onClear}) => {

    const { filtersLayout = [], fields = {} } = presentation
    const [values, setValues] = React.useState(currentValues)

    const handleChange = (name, op, value) => {
      if (!value) {
        setValues(prev => {
          const newValues = { ...prev }
          delete newValues[name]
          return newValues
        })
        return
      }

      setValues(prev => ({...prev, [name]: { op, value }}))
    }

    const FieldRenderer = React.useCallback(({ field, value, onChange }) => {
      switch (field.element) {
        case 'select':
          return (
            <Select
              options={field.options}
              name={field.name}
              label={field.label}
              value={value}
              onChange={(e) =>
                onChange(field.name, field.op || '=', e.target.value)
              }
            />
          )

        default:
          return null
      }
    }, [])

    const renderLayout = React.useCallback((node) => {

      if (node.type === 'row') {
        return (
          <div
            key={node.id || JSON.stringify(node)}
            className="row"
            style={{
              display: 'grid',
              gridTemplateColumns: `repeat(${node.columns || 1}, 1fr)`,
              gap: '12px'
            }}
          >
            {node.children?.map(renderLayout)}
          </div>
        )
      }

      if (node.type === 'field') {
        const field = fields[node.name]
        if (!field) return null

        const filtro = values[node.name] || {}

        return (
          <div key={node.name}>
            <FieldRenderer
              field={{ ...field, name: node.name }}
              value={filtro.value || ''}
              onChange={handleChange}
            />
          </div>
        )
      }

      return null

    }, [fields, values, handleChange, FieldRenderer])

    return (
      <div className="tela-filtros">
        <form className="form-filtros">
          
          <div className="conteiner-title-filters">
            <h1>Filtrar por</h1>
            <button type="button" onClick={onClose}>
              <i data-lucide="x"></i>
            </button>
          </div>

          <div className="conteiner-fields">
            {filtersLayout.map(renderLayout)}
          </div>

          <div className="conteiner-btnFiltros">
            <button type="reset" className="btn-secundario" onClick={onClear}>
              Limpar
            </button>

            <button type="button" className="btn-primario" onClick={() => {onApply(values), onClose()}}>
              Filtrar
            </button>
          </div>

        </form>
      </div>
    )
  }
</script>
