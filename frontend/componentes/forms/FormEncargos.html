<script type="text/babel">

  const FormEncargos = ({ onClose, record, presentation }) => {

    const isEdit = !!(record?._id)
    const { mutate: saveEncargo, isLoading: saving } = useSaveEncargo(onClose)

    const tipoOptions       = presentation?.formFields?.tipoCobranca || []
    const aplicacaoOptions  = presentation?.formFields?.aplicacao    || []
    const recorrenciaOptions= presentation?.formFields?.recorrencia  || []

    const [formData, setFormData] = React.useState({
      id:           '',
      taxaJuros:    '',
      tipoCobranca: '',
      aplicacao:    '',
      recorrencia:  '',
    })

    // Preenche o form ao editar.
    // O domínio Encargo implementa toJSON() → propriedades sem underscore.
    React.useEffect(() => {
      
      if (isEdit && record) {
        setFormData({
          id:           record._id           || '',
          taxaJuros:    record._taxaJuros    ?? '',
          tipoCobranca: record._tipoCobranca || '',
          aplicacao:    record._aplicacao    || '',
          recorrencia:  record._recorrencia  || '',
        })
      }
    }, [record])

    const handleChange = (e) => {
      const { name, value } = e.target
      setFormData(prev => ({ ...prev, [name]: value }))
    }

    const handleSubmit = () => {
      saveEncargo(formData)
    }

    return (
      <div className="drawer-cliente">
        <form className="form-cliente">

          <h3>{isEdit ? 'Editar Encargo' : 'Novo Encargo'}</h3>

          <div className="conteiner-cliente">

            {/* Taxa de Juros */}
            <div>
              <label>Taxa de Juros</label>
              <input
                type="number"
                name="taxaJuros"
                value={formData.taxaJuros}
                onChange={handleChange}
                placeholder="Ex: 0.00033"
                step="0.00001"
              />
            </div>

            {/* Tipo de cobrança */}
            <Select
              options={tipoOptions}
              name="tipoCobranca"
              label="Tipo de Cobrança"
              value={formData.tipoCobranca}
              onChange={handleChange}
            />

            {/* Aplicação */}
            <Select
              options={aplicacaoOptions}
              name="aplicacao"
              label="Aplicação"
              value={formData.aplicacao}
              onChange={handleChange}
            />

            {/* Recorrência */}
            <Select
              options={recorrenciaOptions}
              name="recorrencia"
              label="Recorrência"
              value={formData.recorrencia}
              onChange={handleChange}
            />

          </div>

          <div style={{ marginTop: 'auto', display: 'flex', gap: '8px' }}>
            <button
              type="button"
              className="btn-primario"
              disabled={saving}
              onClick={handleSubmit}
            >
              {saving ? 'Salvando...' : 'Salvar'}
            </button>

            <button type="button" className="btn-secundario" onClick={onClose}>
              Cancelar
            </button>
          </div>

        </form>
      </div>
    )
  }

</script>
