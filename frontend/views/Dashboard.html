<script type="text/babel">
  const Dashboard = () => {
    const { useQuery } = window.ReactQuery;

    const { data, isLoading, error } = useQuery({
      queryKey: ['dashboard'],
      queryFn: () => googleFetch().get('dashboard'),
      refetchOnWindowFocus: false,
      staleTime: 1000 * 60 * 5,
    });

    const d = data?.response?.data;

    React.useEffect(() => {
      if (!isLoading && d) {
        renderCharts(d);
      }
    }, [isLoading, d]);

    React.useEffect(() => {
      if (window.lucide) window.lucide.createIcons();
    }, [isLoading]);

    if (isLoading) {
      return (
        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
          <Loading />
        </div>
      );
    }

    if (error || !d) {
      return (
        <div className="dash-error">
          <i data-lucide="triangle-alert"></i>
          <p>Erro ao carregar o dashboard.</p>
        </div>
      );
    }

    const { kpis, aging, cobStatus, canais, vendedores, clientes } = d;

    return (
      <div className="dash-root">

        {/* Título */}
        <div className="conteiner-titulo-pag">
          <div>
            <h1>Dashboard</h1>
            <p>Visão consolidada da carteira de cobranças</p>
          </div>
          <div className="dash-atualizado">
            <i data-lucide="clock"></i>
            <span>Atualizado em {d.atualizadoEm}</span>
          </div>
        </div>

        {/* KPIs */}
        <div className="dash-kpi-grid">
          {kpis.map((k, i) => (
            <div key={i} className="dash-kpi-card" style={{ '--kpi-cor': k.cor }}>
              <div className="dash-kpi-icon">
                <i data-lucide={k.icon}></i>
              </div>
              <div className="dash-kpi-body">
                <p className="dash-kpi-label">{k.label}</p>
                <p className="dash-kpi-valor">{k.valor}</p>
                <p className="dash-kpi-sub">{k.sub}</p>
              </div>
            </div>
          ))}
        </div>

        {/* Charts Row 1 */}
        <div className="dash-charts-row">

          {/* Aging Chart */}
          <div className="dash-card dash-card-lg">
            <div className="dash-card-header">
              <h2>Aging de Carteira</h2>
              <span className="dash-badge">R$ em aberto por faixa</span>
            </div>
            <canvas id="chartAging"></canvas>
          </div>

          {/* Status Cobranças */}
          <div className="dash-card">
            <div className="dash-card-header">
              <h2>Status das Cobranças</h2>
              <span className="dash-badge">Automação</span>
            </div>
            <div className="dash-status-list">
              {cobStatus.map((s, i) => (
                <div key={i} className="dash-status-row">
                  <div className="dash-status-label">
                    <span className="dash-status-dot" style={{ background: s.cor }}></span>
                    <span>{s.status}</span>
                  </div>
                  <strong style={{ color: s.cor }}>{s.count.toLocaleString('pt-BR')}</strong>
                </div>
              ))}
            </div>
            <canvas id="chartStatus" className="dash-canvas-sm"></canvas>
          </div>

        </div>

        {/* Charts Row 2 */}
        <div className="dash-charts-row dash-charts-row--3">

          {/* Vendedores */}
          <div className="dash-card">
            <div className="dash-card-header">
              <h2>Inadimplência por Vendedor</h2>
              <span className="dash-badge">Top 8</span>
            </div>
            <div className="dash-vendedores">
              {vendedores.map((v, i) => {
                const pct = (v.valor / vendedores[0].valor * 100).toFixed(0);
                const ini = v.nome.split(' ').map(p => p[0]).slice(0, 2).join('');
                return (
                  <div key={i} className="dash-vend-row">
                    <div className="dash-vend-avatar">{ini}</div>
                    <div className="dash-vend-info">
                      <span className="dash-vend-nome">{v.nome}</span>
                      <div className="dash-vend-bar-track">
                        <div className="dash-vend-bar-fill" style={{ width: `${pct}%` }}></div>
                      </div>
                    </div>
                    <span className="dash-vend-valor">{v.valorFmt}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Canal */}
          <div className="dash-card">
            <div className="dash-card-header">
              <h2>Canal de Cobrança</h2>
              <span className="dash-badge">Distribuição</span>
            </div>
            <canvas id="chartCanal"></canvas>
          </div>

          {/* Clientes */}
          <div className="dash-card">
            <div className="dash-card-header">
              <h2>Status de Clientes</h2>
              <span className="dash-badge">Base</span>
            </div>
            <div className="dash-clientes-grid">
              {clientes.map((c, i) => (
                <div key={i} className="dash-cliente-item" style={{ '--item-cor': c.cor }}>
                  <strong style={{ color: c.cor }}>{c.count}</strong>
                  <span>{c.status}</span>
                </div>
              ))}
            </div>
          </div>

        </div>

        {/* Aging Table */}
        <div className="dash-card" style={{ marginBottom: 0 }}>
          <div className="dash-card-header">
            <h2>Aging Detalhado</h2>
            <span className="dash-badge">Por faixa de atraso</span>
          </div>
          <div className="container-tabela">
            <table className="tabela-padrao">
              <thead>
                <tr>
                  <th>Faixa de Atraso</th>
                  <th style={{ textAlign: 'right' }}>Qtd. Títulos</th>
                  <th style={{ textAlign: 'right' }}>Valor Total</th>
                  <th style={{ textAlign: 'right' }}>% Carteira</th>
                  <th>Distribuição</th>
                </tr>
              </thead>
              <tbody>
                {aging.map((r, i) => {
                  const total = aging.reduce((s, x) => s + x.valor, 0);
                  const pct = (r.valor / total * 100).toFixed(1);
                  const barW = Math.round(r.valor / total * 100);
                  return (
                    <tr key={i}>
                      <td>
                        <span className="tag" style={{ background: r.cor + '30', color: r.cor, border: `1px solid ${r.cor}55` }}>
                          {r.faixa}
                        </span>
                      </td>
                      <td style={{ textAlign: 'right' }}>{r.count.toLocaleString('pt-BR')}</td>
                      <td style={{ textAlign: 'right' }}>{r.valorFmt}</td>
                      <td style={{ textAlign: 'right', color: r.cor, fontWeight: 500 }}>{pct}%</td>
                      <td style={{ width: '180px' }}>
                        <div className="dash-bar-mini">
                          <div className="dash-bar-track">
                            <div className="dash-bar-fill" style={{ width: `${barW}%`, background: r.cor }}></div>
                          </div>
                          <span style={{ fontSize: 10, color: '#626262', minWidth: 28 }}>{barW}%</span>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

      </div>
    );
  };

  // ── Chart.js rendering (fora do React, gerenciado manualmente) ────────────
  const _chartInstances = {};

  function renderCharts(d) {

    Chart.defaults.font = { family: "'Poppins', sans-serif", size: 11 };
    Chart.defaults.color = '#626262';

    const gridColor = '#f1f1f2';
    const cores = ['#4caf50', '#7c6af7', '#ffb347', '#ff4560', '#00b4d8', '#c0392b', '#6b1a1a'];
    
    // destroy anteriores
    Object.values(_chartInstances).forEach(c => c.destroy && c.destroy());

    // Aging
    const ctxA = document.getElementById('chartAging');
    if (ctxA) {
      _chartInstances.aging = new Chart(ctxA.getContext('2d'), {
        type: 'bar',
        data: {
          labels: d.aging.map(r => r.faixa),
          datasets: [{
            label: 'R$ em Aberto',
            data: d.aging.map(r => r.valor),
            backgroundColor: d.aging.map(r => r.cor + 'bb'),
            borderColor: d.aging.map(r => r.cor),
            borderWidth: 1,
            borderRadius: 5,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => 'R$ ' + ctx.parsed.y.toLocaleString('pt-BR', { minimumFractionDigits: 2 }) } }
          },
          scales: {
            x: { grid: { color: gridColor } },
            y: { grid: { color: gridColor }, ticks: { callback: v => 'R$ ' + (v / 1000).toFixed(0) + 'k' } }
          }
        }
      });
    }

    // Status donut
    const ctxS = document.getElementById('chartStatus');
    if (ctxS) {
      _chartInstances.status = new Chart(ctxS.getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: d.cobStatus.map(r => r.status),
          datasets: [{
            data: d.cobStatus.map(r => r.count),
            backgroundColor: d.cobStatus.map(r => r.cor + 'bb'),
            borderColor: d.cobStatus.map(r => r.cor),
            borderWidth: 2,
            hoverOffset: 4,
          }]
        },
        options: {
          responsive: true,
          cutout: '68%',
          plugins: { legend: { position: 'right', labels: { padding: 12, boxWidth: 10, boxHeight: 10 } } }
        }
      });
    }

    // Canal horizontal
    const ctxC = document.getElementById('chartCanal');
    if (ctxC) {
      _chartInstances.canal = new Chart(ctxC.getContext('2d'), {
        type: 'bar',
        data: {
          labels: d.canais.map(r => r.canal),
          datasets: [{
            label: 'Cobranças',
            data: d.canais.map(r => r.count),
            backgroundColor: cores.map(c => c + 'bb'),
            borderColor: cores,
            borderWidth: 1,
            borderRadius: 5,
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: gridColor } },
            y: { grid: { display: false } }
          }
        }
      });
    }
  }
</script>
