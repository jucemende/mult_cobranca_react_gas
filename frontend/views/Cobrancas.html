<script type="text/babel">
  const Cobrancas = () => {
    
    const [abaAtiva, setAbaAtiva] = React.useState('clientes')
    const [activeModal, setActiveModal] = React.useState(null)
    const [showDropdownFatura, setShowDropdownFatura] = React.useState(false)
    
    const [importCsvData, setImportCsvData] = React.useState(null)
    const [importFileName, setImportFileName] = React.useState(null)
    const [importError, setImportError] = React.useState(null)
    const [isImporting, setIsImporting] = React.useState(false)
    
    const fileInputRef = React.useRef(null)
    const dropdownRef = React.useRef(null)

    // Fechar dropdown quando modal é aberto
    React.useEffect(() => {
      if (activeModal) {
        setShowDropdownFatura(false)
      }
    }, [activeModal])

    // Fechar dropdown quando clicar fora
    React.useEffect(() => {
      const handleClickOutside = (event) => {
        if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
          setShowDropdownFatura(false)
        }
      }

      if (showDropdownFatura) {
        document.addEventListener('mousedown', handleClickOutside)
        return () => {
          document.removeEventListener('mousedown', handleClickOutside)
        }
      }
    }, [showDropdownFatura])

    // Carregar ícones do Lucide quando o dropdown aparecer
    React.useEffect(() => {
      if (window.lucide && showDropdownFatura) {
        setTimeout(() => {
          const icons = document.querySelectorAll('.dropdown-button-container i[data-lucide]');
          window.lucide.createIcons({ nodes: [...icons] });
        }, 0);
      }
    }, [showDropdownFatura])

    const {
      filtros,
      setFiltro,
      mergeFiltros,
      clearFiltros,
      queryString,
      handleChange,
      filtersApllyed
    } = useFiltros(600)

    const { data, isLoading } = useCobrancas(abaAtiva, queryString)
    const presentation = data?.response?.presentation || {}

    // Totais enviados pelo backend
    const totais = data?.response?.totais || { vlrLiquido: 0, multa: 0, juros: 0, total: 0 };

    const formatCurrency = (value) =>
      value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    // Renderização de tabs
    const tabs = [
      {key: 'clientes',label: 'Clientes'},
      {key: 'faturas',label: 'Faturas'},
      {key: 'pendencias',label: 'Pendencias'}
    ]

    // Funções de navegação de tabs
    const handleClickTab = (tab) => {
      setAbaAtiva(tab)
      setActiveModal(null)
    }

    const isTotais = false
    // Renderização de totalizadores
    const minDash = [
      {label: 'Em Aberto', value: 'R$ 0,00'}, // passar o retorno do backend
      {label: 'Baixadas', value: 'R$ 0,00'},
      {label: 'Cobradas', value: 'R$ 0,00'},
      {label: 'Última Atualização', value: '01/01/1900', class: 'label-atualizacao'}
    ]

    // Totais do rodapé
    const totaliserRodape = [
      {label: 'Valor Líquido', value: formatCurrency(totais.vlrLiquido)},
      {label: 'Multa', value: formatCurrency(totais.multa)},
      {label: 'Juros', value: formatCurrency(totais.juros)},
      {label: 'Total', value: formatCurrency(totais.total)}
    ]

    // Função responsavel por lidar com os forms
    const handleAction = ({ modal, record }) => {
      setActiveModal({ modal, record })
    }

    const handleClose = () => {
      setActiveModal(null)
    }

    // Funções responsaveis por lidar com a imprtação
    const handleOpenImport = () => {
      setActiveModal({ modal: 'import-faturas' })
    }

    const normalizeCsv = (content) =>
      content.replace(/\r\n/g, '\n').replace(/\r/g, '\n')

    const parseCsvLine = (line) => {
      const result = []
      let current = ''
      let inQuotes = false

      for (const char of line) {
        if (char === '"') {
          inQuotes = !inQuotes
          continue
        }

        if (char === ';' && !inQuotes) {
          result.push(current.trim())
          current = ''
          continue
        }

        current += char
      }

      result.push(current.trim())

      return result.map(v => v.replace(/^"|"$/g, ''))
    }

    const csvToJson = (content) => {
      const lines = normalizeCsv(content)
        .split('\n')
        .filter(Boolean)

      if (lines.length < 2) {
        throw new Error('CSV inválido.')
      }

      const headers = parseCsvLine(lines[2])

      return lines.slice(4).map(line => {
        const values = parseCsvLine(line)

        return headers.reduce((obj, key, index) => {
          obj[key] = values[index] ?? ''
          return obj
        }, {})
      })
    }

    const readFileContent = async (file) => {
      const buffer = await file.arrayBuffer()

      try {
        // tenta UTF-8 primeiro
        return new TextDecoder('utf-8', { fatal: true }).decode(buffer)
      } catch {
        // fallback comum em CSV brasileiro
        return new TextDecoder('latin1').decode(buffer)
      }
    }

    const handleFileSelected = async (event) => {
      setImportError(null)

      const file = event.target.files?.[0]
      if (!file) return

      try {
        const content = await readFileContent(file)

        const data = csvToJson(content)

        setImportCsvData(data)
        setImportFileName(file.name)

      } catch (error) {
        setImportError(error.message || 'Falha ao ler CSV')
      }
    }

    const handleChooseFile = () => {
      if (fileInputRef.current) {
        fileInputRef.current.value = ''
        fileInputRef.current.click()
      }
    }

    const handleSubmitImport = async () => {
      if (!importCsvData?.length) {
        setImportError('Selecione um CSV válido.')
        return
      }

      try {
        setIsImporting(true)

        await googleFetch().post('faturas-import', {
          data: importCsvData
        })

        showToast('Relatório importado com sucesso!', 'success')

        window.queryClient?.invalidateQueries({
          queryKey: ['cobranca']
        })

        window.queryClient?.invalidateQueries({
          queryKey: ['clientes']
        })

        handleClose()

      } catch (err) {
        setImportError(err.message || 'Falha ao importar relatório.')
      } finally {
        setIsImporting(false)
      }
    }

    // Função para lidar com o filtro avancado
    const handleSearchChange = (value) => {
      handleChange(value)
    }

    const handleClearFilters = () => {
      setActiveModal(null)
      if(Object.keys(filtersApllyed).length) {
        clearFiltros()
      }
    }

    return (
      <>
        <div className="conteiner-titulo-pag">
          <div id="conteiner-title-pag">
            <h1>Gestão de Cobranças</h1>
            <p>Acompanhe o andamento de todas as fases de cobrança</p>
          </div>
          
          <div id="container-btns-title">
            <div className="dropdown-button-container" ref={dropdownRef}>
              <button 
                className="btn-primario btn-title"
                onClick={() => setShowDropdownFatura(!showDropdownFatura)}
              >
                <i data-lucide="plus"></i>
                <span>Adicionar Fatura</span>
                <i data-lucide="chevron-down" className={`chevron-icon ${showDropdownFatura ? 'active' : ''}`}></i>
              </button>
              
              {showDropdownFatura && (
                <div className="dropdown-menu">
                  <button 
                    type="button"
                    className="dropdown-item"
                    onClick={() => {
                      setActiveModal({ modal: 'create-fatura' })
                      setShowDropdownFatura(false)
                    }}
                  >
                    <i data-lucide="file-plus"></i>
                    <span>Nova Fatura</span>
                  </button>
                  
                  <button 
                    type="button"
                    className="dropdown-item"
                    onClick={() => {
                      handleOpenImport()
                      setShowDropdownFatura(false)
                    }}
                  >
                    <i data-lucide="upload"></i>
                    <span>Importar Relatório</span>
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>

        <div className="conteiner-btn-seguimentacao">
          {tabs.map(tab => (
            <button
              key={tab.key}
              className={`btn-seguimentoRegua ${abaAtiva === tab.key ? 'ativo' : ''}`}
              onClick={() => handleClickTab(tab.key)}
            >
              <span>{tab.label}</span>
            </button>
          ))}
        </div>

        {isTotais && 
          <div class="conteiner-totais-seguimentacao">
            {minDash.map(item => (
              <div className="totais-seguimentacao">
                <p className={item?.class ||  "label-totais"}>{item.label}</p>
                <p className="campo-totais">{item.value}</p>
              </div>
            ))}
          </div>
        }

        <div className="container-filtros">
          <div className="busca-avancada">
            <i data-lucide="search"></i>
            <input
              className="input-buscaAvancada"
              placeholder="Buscar..."
              onChange={(e) => handleSearchChange(e.target.value)}
            />
          </div>

          <div className="container-select-filtros">
            <button 
              type="button"
              className="btn-secundario"
              onClick={() => setActiveModal({ modal: 'filtrar' })}
            >
              Filtros
              <i data-lucide="funnel"></i>
              <div className="count-filtros" id="count-filtros">{Object.keys(filtersApllyed).length}</div>
            </button>

            <div className="container-filtrado" id="tagsFiltradas"></div>
          </div>
        </div>

        <Table
          presentation={presentation}
          data={data?.response?.data || []}
          isLoading={isLoading}
          actionHandlers={handleAction}
          activeModal={activeModal}
        />

        
        {abaAtiva != 'pendencias' &&
          <div className="totais-container">
            <div>
              <p className="caption">Valor Líquido</p>
              <p id="totalOriginal-fatura">{formatCurrency(totais.vlrLiquido)}</p>
            </div>
            <div>
              <p className="caption">Multa</p>
              <p id="totalMulta-fatura">{formatCurrency(totais.multa)}</p>
            </div>
            <div>
              <p className="caption">Juros</p>
              <p id="totalJuros-fatura">{formatCurrency(totais.juros)}</p>
            </div>
            <div>
              <p className="caption">Total</p>
              <p id="totalGeral-fatura">{formatCurrency(totais.total)}</p>
            </div>
          </div>
        }

        {activeModal?.modal === 'edit-clientes' &&
          <FormCliente onClose={handleClose} record={activeModal?.record}/>
        }

        {activeModal?.modal === `cobrar` &&
          <FormCobrancas onClose={handleClose} record={activeModal?.record} />
        }

        {activeModal?.modal === 'filtrar' &&
          <FormFiltro 
            onClose={handleClose}
            currentValues={filtros}
            presentation={presentation} 
            onApply={mergeFiltros} 
            onClear={handleClearFilters}
          /> 
        }

        {activeModal?.modal === 'history' &&
          <FormHistorico record={activeModal?.record} onClose={handleClose} />
        }

        {activeModal?.modal === 'create-fatura' &&
          <FormFaturas onClose={handleClose} record={null}/>
        }

        {activeModal?.modal === 'import-faturas' &&
          <div className="modal-confirm" style={{ display: 'flex' }}>
            <div className="modal-content">
              <p>Importar Relatório de Faturas</p>
              <div className="import-file-card">
                <button type="button" className="btn-secundario" onClick={handleChooseFile}>
                  Selecionar arquivo CSV
                </button>
                {importFileName && <p className="import-file-name">{importFileName}</p>}
                {importError && <p className="import-error">{importError}</p>}
              </div>
              <div className="modal-buttons">
                <button type="button" className="btn-secundario" onClick={handleClose}>Cancelar</button>
                <button
                  type="button"
                  className="btn-primario"
                  disabled={!importCsvData || isImporting}
                  onClick={handleSubmitImport}
                >
                  {isImporting ? 'Importando...' : 'Importar'}
                </button>
              </div>
              <input
                ref={fileInputRef}
                type="file"
                accept=".csv"
                style={{ display: 'none' }}
                onChange={handleFileSelected}
              />
            </div>
          </div>
        }

        {activeModal?.modal === 'edit-fatura' &&
          <FormFaturas onClose={handleClose} record={activeModal?.record}/>
        }

      </>
    );
  }
</script>
