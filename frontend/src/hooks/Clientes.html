<script>
  function useClientes(id = null) {
    return useQuery({
      queryKey: ['record-clientes', id],
      queryFn: () => {
        let endpoint = 'clientes'

        if (id) {
          endpoint = `${endpoint}/${id}`
        }
        
        return googleFetch().get(endpoint)
        
      },
      refetchOnWindowFocus: false,
      staleTime: 1000 * 60 * 5,
      retry: false,
    });
  }

  function useClientesList(filters = null) {
    return useQuery({
      queryKey: ['clientes-list', filters],
      queryFn: () => googleFetch().get('clientes', filters),
      refetchOnWindowFocus: false,
      staleTime: 1000 * 60 * 5,
      retry: false,
      enabled: true
    });
  }

  function useSaveCliente(onClose) {
    return useMutation({
      mutationFn: (body) => {
        return body.id
          ? googleFetch().put(`clientes/${body.id}`, body)
          : googleFetch().post('clientes', body)
      },
      onSuccess: async () => {
        await window.queryClient.invalidateQueries({ queryKey: ['clientes-list'] });
        await window.queryClient.invalidateQueries({ queryKey: ['record-clientes'] });
        await window.queryClient.invalidateQueries({ queryKey: ['cobranca'] });
        onClose();
      }
    })
  }
</script>
