<script>
  const rotas = {
    clientes: 'faturas-agrupadas',
    faturas: 'faturas-list',
    pendencias: 'cobrancas-list'
  }

  function useCobrancas(aba, filters = null) {
    return useQuery({
      queryKey: ['cobranca', aba, filters],
      queryFn: () => {
        let endpoint = rotas[aba]

        if (!endpoint) {
          throw new Error(`Rota ${aba} não configurada.`);
        }

        return googleFetch().get(endpoint, filters)
        
      },
      refetchOnWindowFocus: false,
      staleTime: 1000 * 60 * 1,
      retry: false,
      enabled: !!rotas[aba]
    });
  }

  function useCobrancasView(codCliente) {
    return useQuery({
      queryKey: ['cobranca-view', codCliente],
      queryFn: () => {
        return googleFetch().get(`cobrancas-view/${codCliente}`)
      },
      refetchOnWindowFocus: false,
      staleTime: 1000 * 60 * 5,
      retry: false,
    });
  }

  function useSendWhatsApp() {
    return useMutation({
      mutationFn: (body) => {
        return googleFetch().post(`cobrancas-sendCharge`, body);
      },
      onSuccess: (response) => {
        const { link } = response?.response;
        if (link) window.open(link, '_blank');
      }
    });
  }

  function useSendEmail() {
    
    const queryClient = useQueryClient()

    return useMutation({
      mutationFn: (body) => {
        return googleFetch().post(`cobrancas-sendCharge`, body);
      },
      onSuccess: (response) => {
        queryClient.invalidateQueries({ queryKey: ['cobranca'] });
        showToast("Operação realizada com sucesso!", "success")
      }
    });
  }

</script>
