<script>
  const rotas = {
    clientes: 'faturas-agrupadas',
    faturas: 'faturas-list',
    pendencias: 'cobrancas-list'
  }

  function useCobrancas(aba) {
    return useQuery({
      queryKey: ['cobranca', aba],
      queryFn: () => {
        const endpoint = rotas[aba]

        if (!endpoint) {
          throw new Error(`Rota ${aba} não configurada.`);
        }
        
        return googleFetch().get(endpoint)
        
      },
      refetchOnWindowFocus: false,
      staleTime: 1000 * 60 * 1,
      enabled: !!rotas[aba]
    });
  }

  function useCobrancasView(codCliente) {
    return useQuery({
      queryKey: ['cobranca-view', codCliente],
      queryFn: () => {
        return googleFetch().get(`cobrancas-view/${codCliente}`)
      },
      refetchOnWindowFocus: false,
      staleTime: 1000 * 60 * 5,
    });
  }

  function useSendWhatsApp() {
    return useMutation({
      mutationFn: (body) => {
        return googleFetch().post(`cobrancas-sendCharge`, body);
      },
      onSuccess: (response) => {
        const { link } = response?.response;
        if (link) window.open(link, '_blank');
      }
    });
  }




</script>
