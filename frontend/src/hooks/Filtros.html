<script>
  const useFiltros = (delay = 600) => {
    const [filtros, setFiltros] = React.useState({})
    const [debounced, setDebounced] = React.useState({})
    
    const { search, ...filtersApllyed } = filtros
    const debounceRef = React.useRef(null)

    // Função debouce para searchs
    const handleChange = (value) => {
      if (debounceRef.current) {
        clearTimeout(debounceRef.current)
      }

      debounceRef.current = setTimeout(() => {
        setFiltros(prev => {
          const novo = { ...prev }

          if (value && value.trim() !== '') {
            novo.search = { op: '=', value }
          } else {
            delete novo.search
          }

          return novo
        })
      }, delay)
    }

    const setFiltro = (name, op, value) => {
      setFiltros(prev => {
        const novo = { ...prev }

        if (!value || value.toString().trim() === '') {
          delete novo[name]
        } else {
          novo[name] = { op, value }
        }

        return novo
      })
    }

    // Inclui os filtros expecificos ao query
    const mergeFiltros = (novos) => {
      setFiltros(prev => ({ ...prev, ...novos }))
    }

    // Apaga os filtros expecificos, mantém a busca avançada
    const clearFiltros = () => {
      setFiltros(prev => {
        return prev.search ? { search: prev.search } : {}
      })
    }

    // debounce global
    React.useEffect(() => {
      setDebounced(filtros)
    }, [filtros])

    // Função que monda a query da busca
    const queryString = React.useMemo(() => {
      return Object.keys(debounced)
        .map(key => {
          const { op, value } = debounced[key]
          return `${encodeURIComponent(key)}${op}${value}`
        })
        .join('&')
    }, [debounced])

    return {
      filtros,
      setFiltro,
      mergeFiltros,
      clearFiltros,
      queryString,
      handleChange,
      filtersApllyed
    }
  }
</script>
