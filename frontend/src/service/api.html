<script>

  function googleFetch() {
    
    const api = (payload) => {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.success === false) {
              reject(new Error(res.message || "Erro desconhecido no servidor"));
            } else {
              resolve(res);
            }
          })
          .withFailureHandler((err) => {
            reject(err)
          })
          .fetchApp(payload)
      })
    }

    return {
      get: (endpoint, filters = null) => {
        const url = filters 
          ? `${endpoint}?${filters}` 
          : endpoint;
        
        return api({ method: 'GET', url}
        );
      },

      post: (url, body = {}) => {
        return api(
          {method: 'POST', url, body}
        )
      },

      put: (url, body = {}) => {
        return api({ method: 'PUT', url, body });
      },
 
      delete: (url) => {
        return api({ method: 'DELETE', url });
      }
    }
  }

</script>
